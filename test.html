<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Dropdown Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: white;
    }

    nav {
      background: #222;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .menu {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .menu li {
      position: relative;
    }

    .menu li a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      display: block;
    }

    /* Dropdown */
    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      background: #333;
      min-width: 150px;
      z-index: 99;
    }

    .dropdown-content a {
      padding: 0.5rem 1rem;
    }

    .menu li:hover .dropdown-content {
      display: block;
    }

    /* Hamburger button */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .menu {
        display: none;
        flex-direction: column;
        width: 100%;
        background: #222;
        position: absolute;
        top: 100%;
        left: 0;
      }

      .menu.show {
        display: flex;
      }

      .hamburger {
        display: flex;
      }

      .menu li:hover .dropdown-content {
        position: static;
        display: block;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">MySite</div>
    <div class="hamburger" id="hamburger">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <ul class="menu" id="menu">
      <li><a href="#">Home</a></li>
      <li>
        <a href="#">Services ▾</a>
        <div class="dropdown-content">
          <a href="#">Web Design</a>
          <a href="#">App Development</a>
          <a href="#">SEO</a>
        </div>
      </li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <script>
    const hamburger = document.getElementById('hamburger');
    const menu = document.getElementById('menu');

    hamburger.addEventListener('click', () => {
      menu.classList.toggle('show');
    });
  </script>

</body>
</html>
